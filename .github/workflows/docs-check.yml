name: Docs Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs-check.yml'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build docs
        run: mkdocs build --clean --strict

      - name: Reject root-relative Markdown links
        run: |
          if rg -n '!?\[[^]\n]*\]\(/' docs --glob '*.md'; then
            echo 'Found root-relative internal Markdown links or images. Use source-relative paths instead.'
            exit 1
          fi

      - name: Reject raw HTML internal links
        run: |
          if rg -n '<(?:img|a)\b[^>]*(?:src|href)="/' docs --glob '*.md'; then
            echo 'Found raw HTML internal links or images. Use Markdown syntax instead.'
            exit 1
          fi

      - name: Reject emitted internal .md links
        run: |
          if rg -n '(?:href|src)="(?:/|(?:\.\./)+|\./)[^"]+\.md(?:#|")' site --glob '*.html'; then
            echo 'Found emitted internal .md links in generated HTML.'
            exit 1
          fi
